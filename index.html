<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>數獨演算法實驗室 | Sudoku Lab</title>
    <script async src="https://www.vercount.one/js" crossorigin="anonymous"></script>
    
    <!-- PWA Meta Elements -->
    <link rel="manifest" href="/ai-sudoku/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/ai-sudoku/icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/ai-sudoku/sw.js')
            .then((reg) => console.log('[Service Worker] Registered successfully scope:', reg.scope))
            .catch((err) => console.error('[Service Worker] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
